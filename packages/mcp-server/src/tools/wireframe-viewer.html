<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wire DSL Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 24px; background: transparent; color: #1a1a1a; }
    #loading { opacity: 0.4; font-size: 13px; }
    .screen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .label { font-size: 11px; font-weight: 600; opacity: 0.45; letter-spacing: 0.08em; text-transform: uppercase; }
    .actions { display: flex; gap: 6px; }
    .btn-dl {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid currentColor;
      opacity: 0.45;
      background: transparent;
      color: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    .btn-dl:hover { opacity: 0.85; }
    .card {
      border-radius: 8px;
      padding: 16px;
      display: inline-block;
      max-width: 100%;
      overflow: auto;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.10);
      background: #ffffff;
    }
    .card svg { display: block; max-width: 100%; height: auto; }
    @media (prefers-color-scheme: dark) {
      body { color: #e0e0e0; }
      .card { background: #2a2a2a; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.30); }
    }
  </style>
</head>
<body>
  <p id="loading">Loading wireframe...</p>
  <div id="root"></div>
  <script type="module">
    /*__EXT_APPS_BUNDLE__*/
    var App = globalThis.ExtApps && globalThis.ExtApps.App;

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function slugify(s) {
      return String(s || 'screen')
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-');
    }

    function dl(filename, content, mime) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type: mime }));
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    var _wireCode = '';
    var _hostTheme = null;
    var _rendered = false;
    var _extAppsConnected = false;
    var _root = document.getElementById('root');
    var _loading = document.getElementById('loading');

    function getTheme() {
      if (_hostTheme) return _hostTheme;
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
      return 'light';
    }

    function applyTheme() {
      var dark = getTheme() === 'dark';
      document.body.style.color = dark ? '#e0e0e0' : '#1a1a1a';
      document.querySelectorAll('.card').forEach(function(el) {
        el.style.background = dark ? '#2a2a2a' : '#ffffff';
        el.style.boxShadow = dark ? '0 1px 4px rgba(0,0,0,0.30)' : '0 1px 4px rgba(0,0,0,0.10)';
      });
    }

    function render(data) {
      _rendered = true;
      _loading.style.display = 'none';
      if (!data || data.error) {
        _root.innerHTML = '<p style="color:#c0392b">' + esc((data && data.error) || 'No data received') + '</p>';
        return;
      }

      var screens = Array.isArray(data.screens) ? data.screens : [];
      _wireCode = data.wire_code || '';
      _root.innerHTML = '';

      screens.forEach(function(s) {
        var slug = slugify(s.name);

        var screenEl = document.createElement('div');
        screenEl.className = 'screen';

        var headerEl = document.createElement('div');
        headerEl.className = 'screen-header';

        var labelEl = document.createElement('span');
        labelEl.className = 'label';
        labelEl.textContent = s.name || 'Screen';

        var actionsEl = document.createElement('div');
        actionsEl.className = 'actions';

        var svgBtn = document.createElement('button');
        svgBtn.className = 'btn-dl';
        svgBtn.textContent = 'Download SVG';
        svgBtn.addEventListener('click', function() {
          dl(slug + '.svg', s.svg || '', 'image/svg+xml');
        });
        actionsEl.appendChild(svgBtn);

        if (_wireCode) {
          var wireBtn = document.createElement('button');
          wireBtn.className = 'btn-dl';
          wireBtn.textContent = 'Download .wire';
          wireBtn.addEventListener('click', function() {
            dl('wireframe.wire', _wireCode, 'text/plain');
          });
          actionsEl.appendChild(wireBtn);
        }

        headerEl.appendChild(labelEl);
        headerEl.appendChild(actionsEl);

        var cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.innerHTML = s.svg || '';

        screenEl.appendChild(headerEl);
        screenEl.appendChild(cardEl);
        _root.appendChild(screenEl);
      });

      applyTheme();
    }

    function extractPayload(result) {
      if (!result) return null;
      if (result.structuredContent) return result.structuredContent;
      var textBlock =
        Array.isArray(result.content) &&
        result.content.find(function(c) {
          return c && c.type === 'text' && typeof c.text === 'string';
        });
      if (!textBlock) return null;
      try {
        return JSON.parse(textBlock.text);
      } catch (_err) {
        return null;
      }
    }

    function sendRpcResult(id, result) {
      window.parent.postMessage(
        {
          jsonrpc: '2.0',
          id: id,
          result: result,
        },
        '*'
      );
    }

    function handleRpcMessage(msg) {
      if (!msg || msg.jsonrpc !== '2.0') return;

      if (msg.method === 'ui/initialize' && !_extAppsConnected) {
        var initializeCtx = (msg.params && msg.params.hostContext) || {};
        if (initializeCtx.theme) _hostTheme = initializeCtx.theme;
        sendRpcResult(msg.id, {
          protocolVersion: '2026-01-26',
          capabilities: {},
          appInfo: { name: 'Wire DSL Wireframe Viewer', version: '0.1.0' },
        });
        return;
      }

      if (msg.method === 'ui/notifications/tool-result') {
        var payload = extractPayload(msg.params || msg);
        if (payload) render(payload);
        return;
      }

      if (msg.method === 'ui/notifications/host-context-changed') {
        var hostCtx = (msg.params && msg.params.hostContext) || {};
        if (hostCtx.theme) {
          _hostTheme = hostCtx.theme;
          applyTheme();
        }
        return;
      }

      if (msg.method === 'ping' && !_extAppsConnected) {
        sendRpcResult(msg.id, {});
      }
    }

    window.addEventListener('message', function(event) {
      handleRpcMessage(event.data);
    });

    async function connectExtAppsBridge() {
      if (!App) return;
      try {
        var app = new App({ name: 'Wire DSL Wireframe Viewer', version: '0.1.0' }, {});

        app.ontoolresult = function(result) {
          var payload = extractPayload(result);
          if (payload) render(payload);
        };

        app.onhostcontextchanged = function(ctx) {
          if (ctx && ctx.theme) {
            _hostTheme = ctx.theme;
            applyTheme();
          }
        };

        await app.connect();
        _extAppsConnected = true;

        var ctx = app.getHostContext ? app.getHostContext() : null;
        if (ctx && ctx.theme) {
          _hostTheme = ctx.theme;
          applyTheme();
        }
      } catch (_err) {
        // Keep legacy fallback below for older hosts/builds.
      }
    }

    (function pollOpenAI() {
      if (_rendered) return;
      if (window.openai && window.openai.toolOutput) {
        Promise.resolve(window.openai.toolOutput).then(function(d) {
          if (!_rendered) render(d);
        }).catch(function() {});
      } else {
        setTimeout(pollOpenAI, 100);
      }
    })();

    (async function init() {
      await connectExtAppsBridge();
      applyTheme();
    })();
  </script>
</body>
</html>
